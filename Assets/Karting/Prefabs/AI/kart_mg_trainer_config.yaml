default_settings:
  trainer_type: ppo
  hyperparameters:
    batch_size: 1024
    buffer_size: 10240
    learning_rate: 3.0e-4
    beta: 5.0e-3
    epsilon: 0.2
    lambd: 0.95
    num_epoch: 3
    learning_rate_schedule: linear
  network_settings:
    normalize: false
    hidden_units: 128
    num_layers: 2
    vis_encode_type: simple
  reward_signals:
    extrinsic:
      gamma: 0.99
      strength: 1.0
  keep_checkpoints: 5
  checkpoint_interval: 500000
  max_steps: 5.0e10
  time_horizon: 64
  summary_freq: 1000
  threaded: false

behaviors:
  ArcadeDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 20480
      learning_rate: 1.5e-4
      beta: 2.5e-3
      epsilon: 0.15
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    keep_checkpoints: 5
    checkpoint_interval: 500000
    max_steps: 2.5e7
    time_horizon: 128
    summary_freq: 2000
    threaded: false

  4x4Driver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      beta: 5.0e-4

  MuscleDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512

  RoadsterDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      learning_rate: 2.0e-4
